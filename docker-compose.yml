services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://nadil.cloud/api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - nadil

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:/app/data/dev.db
      - LLM_PROVIDER=${LLM_PROVIDER:-opencode}
      - LLM_MODEL=${LLM_MODEL:-deepseek-v4-flash}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=https://nadil.cloud
      - CORS_ORIGIN=https://nadil.cloud
      - DUALHOOK_API_KEY=${DUALHOOK_API_KEY}
      - DUALHOOK_SIGNING_SECRET=${DUALHOOK_SIGNING_SECRET}
      - DUALHOOK_REDIRECT_BASE=https://nadil.cloud
    volumes:
      - backend-data:/app/data
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - nadil

volumes:
  backend-data:

networks:
  nadil:
    driver: bridge
