services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://api.nadil.cloud/api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - nadil

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:./data/dev.db
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=https://nadil.cloud
      - CORS_ORIGIN=https://nadil.cloud
      - LLM_PROVIDER=${LLM_PROVIDER:-opencode}
      - LLM_MODEL=${LLM_MODEL:-deepseek-v4-flash}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
    volumes:
      - backend-data:/app/data
    networks:
      - nadil

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - nadil

volumes:
  backend-data:
  caddy-data:
  caddy-config:

networks:
  nadil:
    driver: bridge
